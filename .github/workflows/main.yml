name: CI-RDP-Winget-Fixed

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Install ngrok via Winget
      run: |
        # Paksa install pake winget sesuai request
        winget install ngrok -s msstore --accept-source-agreements --accept-package-agreements
        
        # Refresh Path biar command 'ngrok' langsung ke-detect
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        
        # Cek versi buat mastiin udah terinstall
        ngrok --version
      shell: powershell

    - name: Auth ngrok
      run: |
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
      shell: powershell

    - name: Setup RDP User & Settings
      run: |
        # 1. Enable RDP & Matikan User Auth Layer biar gampang konek
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # 2. Bikin User Baru dengan Password Kuat
        $name = "Rapz"
        $password = "RapzzPw@123#"
        $securePass = ConvertTo-SecureString $password -AsPlainText -Force
        
        # Create user dengan password baru lo
        New-LocalUser -Name $name -Password $securePass -Description "RDP User" -AccountNeverExpires
        
        # 3. Masukin ke grup Admin & RDP
        Add-LocalGroupMember -Group "Administrators" -Member $name
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $name
        
        Write-Host "User $name berhasil dibuat dengan password baru!" -ForegroundColor Green
      shell: powershell

    - name: Create Tunnel & Show Info
      run: |
        Write-Host "`n==============================" -ForegroundColor Cyan
        Write-Host "   RDP READY TO CONNECT!" -ForegroundColor Green
        Write-Host "==============================" -ForegroundColor Cyan
        Write-Host "Username : Rapz"
        Write-Host "Password : RapzzPw@123#"
        Write-Host "==============================`n"
        Write-Host "Cek Dashboard Ngrok atau log di bawah buat URL TCP-nya..."
        
        # Start ngrok tunnel
        ngrok tcp 3389
      shell: powershell
