name: RDP-Serveo-Direct
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setup Password Policy
      run: |
        # Matiin password complexity biar gak rewel
        secedit /export /cfg config.inf
        (Get-Content config.inf) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' | Set-Content config.inf
        secedit /configure /db $env:windir\security\local.sdb /cfg config.inf /areas SECURITYPOLICY
      shell: powershell

    - name: Setup RDP User & Settings
      run: |
        # Aktifkan RDP & Firewall
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # Bikin User Baru
        $name = "Rapz"
        $password = "RapzzPw@123#"
        $securePass = ConvertTo-SecureString $password -AsPlainText -Force
        
        # Hapus dulu kalau usernya udah ada (biar gak error pas re-run)
        if (Get-LocalUser -Name $name -ErrorAction SilentlyContinue) { Remove-LocalUser -Name $name }
        
        New-LocalUser -Name $name -Password $securePass -Description "RDP User" -AccountNeverExpires
        Add-LocalGroupMember -Group "Administrators" -Member $name
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $name
      shell: powershell

    - name: Connect to Serveo (Direct Tunnel)
      run: |
        Write-Host "`n==============================" -ForegroundColor Cyan
        Write-Host "   RDP SERVEO DIRECT READY!" -ForegroundColor Green
        Write-Host "==============================" -ForegroundColor Cyan
        Write-Host "Username : Rapz"
        Write-Host "Password : RapzzPw@123#"
        Write-Host "==============================`n"
        Write-Host "CARA KONEK:" -ForegroundColor Yellow
        Write-Host "1. Tunggu log di bawah muncul tulisan 'Forwarding TCP connections from serveo.net:XXXXX'"
        Write-Host "2. Buka RDP (MSTSC) di Laptop lo, masukin alamat 'serveo.net:XXXXX'"
        Write-Host "3. Login pake user Rapz tadi."
        Write-Host "==============================`n"

        # Loop biar tunnel tetep idup kalau sempet keganggu
        while($true) {
          Write-Host "[$(Get-Date)] Membuka Tunnel SSH ke Serveo..." -ForegroundColor Gray
          # -R 0:localhost:3389 -> Serveo bakal kasih port random buat port RDP lo
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R 0:localhost:3389 serveo.net
          Write-Host "[$(Get-Date)] Tunnel terputus, mencoba menyambung ulang dalam 5 detik..." -ForegroundColor Red
          Start-Sleep -Seconds 5
        }
      shell: powershell
