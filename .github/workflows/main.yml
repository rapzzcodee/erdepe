name: RDP-Cloudflared-Free
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setup Password Policy
      run: |
        # Matiin password complexity biar gak error pas bikin user
        secedit /export /cfg config.inf
        (Get-Content config.inf) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' | Set-Content config.inf
        secedit /configure /db $env:windir\security\local.sdb /cfg config.inf /areas SECURITYPOLICY
      shell: powershell

    - name: Setup RDP User & Settings
      run: |
        # Aktifkan RDP
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # Bikin User Baru
        $name = "Rapz"
        $password = "RapzzPw@123#"
        $securePass = ConvertTo-SecureString $password -AsPlainText -Force
        New-LocalUser -Name $name -Password $securePass -Description "RDP User" -AccountNeverExpires
        Add-LocalGroupMember -Group "Administrators" -Member $name
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $name
      shell: powershell

    - name: Install & Run Cloudflared (No Login)
      run: |
        # Download Cloudflared executable
        Invoke-WebRequest -Uri https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe -OutFile cloudflared.exe
        
        Write-Host "==============================" -ForegroundColor Cyan
        Write-Host "   RDP READY TO CONNECT!" -ForegroundColor Green
        Write-Host "==============================" -ForegroundColor Cyan
        Write-Host "Username : Rapz"
        Write-Host "Password : RapzzPw@123#"
        Write-Host "==============================`n"
        Write-Host "Tunggu sebentar, lagi nyari URL tunnel..." -ForegroundColor Yellow
        
        # Jalankan tunnel tanpa login (Quick Tunnel)
        # Port RDP default adalah 3389
        .\cloudflared.exe tunnel --url tcp://localhost:3389
      shell: powershell
