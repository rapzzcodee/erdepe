name: RDP-Rapzz-Winget-Version
on: workflow_dispatch

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Disable Windows Password Complexity
        run: |
          secedit /export /cfg config.inf
          (Get-Content config.inf) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' | Set-Content config.inf
          secedit /configure /db $env:windir\security\local.sdb /cfg config.inf /areas SECURITYPOLICY
          Remove-Item config.inf

      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User Rapzz
        run: |
          $password = "RapzzPw123" 
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "Rapzz" -Password $securePass -Description "RDP User" -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "Rapzz"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Rapzz"
          echo "RDP_USER=Rapzz" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install ngrok via Winget
        run: |
          # Install pake command dari dokumentasi yang lo kasih
          winget install ngrok -s msstore --accept-source-agreements --accept-package-agreements
          
          # Refresh path supaya command 'ngrok' langsung dikenali
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          
          # Tambahin Authtoken
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        shell: powershell

      - name: Start ngrok Tunnel
        run: |
          # Jalankan tunnel TCP port 3389
          Start-Process -FilePath "ngrok" -ArgumentList "tcp 3389" -WindowStyle Hidden
          Start-Sleep -Seconds 15
          
          # Ambil URL public
          $ngrok_api = Invoke-RestMethod http://localhost:4040/api/tunnels
          $public_url = $ngrok_api.tunnels[0].public_url
          $clean_url = $public_url -replace "tcp://", ""
          echo "NGROK_URL=$clean_url" >> $env:GITHUB_ENV
        shell: powershell

      - name: Show Info & Keep Alive
        run: |
          Write-Host "`n==============================" -ForegroundColor Cyan
          Write-Host "   RDP WINGET VERSION READY!" -ForegroundColor Green
          Write-Host "==============================" -ForegroundColor Cyan
          Write-Host "Address  : $env:NGROK_URL" -ForegroundColor Yellow
          Write-Host "Username : $env:RDP_USER"
          Write-Host "Password : $env:RDP_PASS"
          Write-Host "==============================" -ForegroundColor Cyan
          
          while ($true) {
            $date = Get-Date -Format "HH:mm:ss"
            Write-Host "[$date] Stayin' alive... 🕺"
            Start-Sleep -Seconds 300
          }
