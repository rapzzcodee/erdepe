name: RDP-Tailscale-Final
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setup Password Policy
      run: |
        # Matiin password complexity biar gampang pas login
        secedit /export /cfg config.inf
        (Get-Content config.inf) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' | Set-Content config.inf
        secedit /configure /db $env:windir\security\local.sdb /cfg config.inf /areas SECURITYPOLICY
      shell: powershell

    - name: Setup RDP User & Settings
      run: |
        # Aktifkan RDP
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # Bikin User: Rapz
        $name = "Rapz"
        $password = "RapzzPw@123#"
        $securePass = ConvertTo-SecureString $password -AsPlainText -Force
        if (Get-LocalUser -Name $name -ErrorAction SilentlyContinue) { Remove-LocalUser -Name $name }
        
        New-LocalUser -Name $name -Password $securePass -Description "RDP User" -AccountNeverExpires
        Add-LocalGroupMember -Group "Administrators" -Member $name
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $name
      shell: powershell

    - name: Install & Connect Tailscale
      run: |
        # Download & Install Tailscale
        $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest.msi"
        Invoke-WebRequest -Uri $url -OutFile tailscale.msi
        Start-Process msiexec.exe -ArgumentList "/i", "tailscale.msi", "/quiet", "/norestart" -Wait
        
        # Connect Tailscale pake Auth Key
        # --hostname biar gampang dicari di dashboard
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-github-rapz
        
        # Ambil IP Tailscale buat dipajang di log
        $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
        echo "TS_IP=$tsIP" >> $env:GITHUB_ENV
      shell: powershell

    - name: Final Info & Keep Alive
      run: |
        Write-Host "`n==============================" -ForegroundColor Cyan
        Write-Host "   RDP TAILSCALE IS ONLINE!" -ForegroundColor Green
        Write-Host "==============================" -ForegroundColor Cyan
        Write-Host "IP Address : $env:TS_IP" -ForegroundColor Yellow
        Write-Host "Username   : Rapz"
        Write-Host "Password   : RapzzPw@123#"
        Write-Host "==============================`n"
        Write-Host "Cara Connect:"
        Write-Host "1. Pastikan Tailscale nyala di Laptop/HP lo."
        Write-Host "2. Buka MSTSC, masukin IP: $env:TS_IP"
        Write-Host "3. Login pake user Rapz."
        
        # Keep runner alive
        while($true) {
          $time = Get-Date -Format "HH:mm:ss"
          Write-Host "[$time] Tailscale Mesh Active... 🛡️"
          Start-Sleep -Seconds 300
        }
      shell: powershell
